<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listado de Afiliados</title>

  <style>
    body {
      font-family: Arial;
      padding: 10px;
      margin: 0;
    }

    h2 {
      margin-top: 0;
    }

    input {
      padding: 12px;
      width: 100%;
      font-size: 16px;
      margin-bottom: 15px;
      box-sizing: border-box;
    }

    .info {
      margin-bottom: 10px;
      color: #555;
      font-size: 14px;
    }

    /* TABLA (desktop) */
    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      font-size: 14px;
    }

    th {
      background: #f4f4f4;
    }

    /* TARJETAS (mobile) */
    .cards {
      display: none;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .card div {
      margin-bottom: 4px;
      font-size: 14px;
    }

    .card strong {
      color: #333;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      table {
        display: none;
      }

      .cards {
        display: block;
      }
    }
  </style>
</head>
<body>

<h2>Buscar afiliado</h2>
<input type="text" id="buscador" placeholder="Escribe nombre, teléfono, etc...">

<div class="info" id="info"></div>

<!-- TABLA -->
<table>
  <thead>
    <tr>
      <th>N°</th>
      <th>Nombre</th>
      <th>Dirección</th>
      <th>Teléfono</th>
      <th>Email</th>
      <th>Dirigente</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<!-- TARJETAS MOBILE -->
<div id="cards" class="cards"></div>

<script>
let datos = [];
let timeout;
const LIMITE = 50;

// Cargar datos
fetch('datos.json?v=' + new Date().getTime())
  .then(res => res.json())
  .then(data => {
    datos = data;
    mostrarDatos(datos);
  });

// Normalizar
function normalizar(p) {
  return {
    id: p.N_Afil || p["N°Afil"] || "",
    nombre: p.Nombre || p["Apellido y Nombre"] || "",
    direccion: p.Direccion || p["Dirección"] || "",
    telefono: p.Telefono || p["Teléfono"] || "",
    email: p.Email || p["gmail"] || "",
    dirigente: p.Dirigente || p["dirigente"] || ""
  };
}

// Limpiar texto
function limpiarTexto(texto) {
  return (texto || "")
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// Mostrar datos
function mostrarDatos(lista) {
  const tabla = document.getElementById('tabla');
  const cards = document.getElementById('cards');
  const info = document.getElementById('info');

  const limitados = lista.slice(0, LIMITE);

  let htmlTabla = '';
  let htmlCards = '';

  limitados.forEach(p => {
    const d = normalizar(p);

    // tabla
    htmlTabla += `
      <tr>
        <td>${d.id}</td>
        <td>${d.nombre}</td>
        <td>${d.direccion}</td>
        <td>${d.telefono}</td>
        <td>${d.email}</td>
        <td>${d.dirigente}</td>
      </tr>
    `;

    // cards (mobile)
    htmlCards += `
      <div class="card">
        <div><strong>${d.nombre}</strong></div>
        <div>📞 ${d.telefono}</div>
        <div>📍 ${d.direccion}</div>
        <div>✉️ ${d.email}</div>
        <div>👤 ${d.dirigente}</div>
      </div>
    `;
  });

  tabla.innerHTML = htmlTabla;
  cards.innerHTML = htmlCards;

  info.textContent = `Mostrando ${limitados.length} de ${lista.length} resultados`;
}

// Buscador
document.getElementById('buscador').addEventListener('keyup', e => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    const texto = limpiarTexto(e.target.value);

    const filtrados = datos.filter(p => {
      const d = normalizar(p);

      return (
        limpiarTexto(d.nombre).includes(texto) ||
        limpiarTexto(d.telefono).includes(texto) ||
        limpiarTexto(d.direccion).includes(texto) ||
        limpiarTexto(d.email).includes(texto) ||
        limpiarTexto(d.dirigente).includes(texto)
      );
    });

    mostrarDatos(filtrados);
  }, 300);
});
</script>

</body>
</html>
