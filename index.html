<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listado de Afiliados</title>

  <style>
    body { font-family: Arial; padding: 10px; margin: 0; }
    input { padding: 12px; width: 100%; font-size: 16px; margin-bottom: 15px; }
    .info { margin-bottom: 10px; color: #555; font-size: 14px; }

    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; font-size: 14px; }
    th { background: #f4f4f4; }

    .cards { display: none; }
    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    @media (max-width: 768px) {
      table { display: none; }
      .cards { display: block; }
    }
  </style>
</head>
<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>Acceso</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>
</div>

<!-- 🔎 APP -->
<div id="app" style="display:none;">
  <h2>Buscar afiliado</h2>
  <input type="text" id="buscador" placeholder="Escribe nombre, teléfono, etc...">
  <div class="info" id="info"></div>

  <table>
    <thead>
      <tr>
        <th>N°</th>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th>Dirigente</th>
      </tr>
    </thead>
    <tbody id="tabla"></tbody>
  </table>

  <div id="cards" class="cards"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 COMPLETAR ESTO DESDE FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBukDOR_dpgeAQehTSL8ebazhv7pbZ9aTo",
  authDomain: "buscador-afiliado-dbb3f.firebaseapp.com",
  projectId: "buscador-afiliado-dbb3f"
};
/* 🔴 FIN */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let datos = [];
let timeout;
const LIMITE = 50;

/* 🔐 LOGIN */
window.login = function() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {})
    .catch(error => alert(error.message));
};

/* 🔁 SESIÓN */
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('app').style.display = "block";
    cargarDatos();
  }
});

/* 📡 FIREBASE (REEMPLAZA fetch) */
async function cargarDatos() {
  const querySnapshot = await getDocs(collection(db, "afiliados"));
  datos = querySnapshot.docs.map(doc => doc.data());
  mostrarDatos(datos);
}

/* 🔧 TU LÓGICA ORIGINAL (INTACTA) */
function normalizar(p) {
  return {
    id: p.N_Afil || p["N°Afil"] || "",
    nombre: p.Nombre || p["Apellido y Nombre"] || "",
    direccion: p.Direccion || p["Dirección"] || "",
    telefono: p.Telefono || p["Teléfono"] || "",
    email: p.Email || p["gmail"] || "",
    dirigente: p.Dirigente || p["dirigente"] || ""
  };
}

function limpiarTexto(texto) {
  return (texto || "")
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function mostrarDatos(lista) {
  const tabla = document.getElementById('tabla');
  const cards = document.getElementById('cards');
  const info = document.getElementById('info');

  const limitados = lista.slice(0, LIMITE);

  let htmlTabla = '';
  let htmlCards = '';

  limitados.forEach(p => {
    const d = normalizar(p);

    htmlTabla += `
      <tr>
        <td>${d.id}</td>
        <td>${d.nombre}</td>
        <td>${d.direccion}</td>
        <td>${d.telefono}</td>
        <td>${d.email}</td>
        <td>${d.dirigente}</td>
      </tr>
    `;

    htmlCards += `
      <div class="card">
        <div><strong>${d.nombre}</strong></div>
        <div>📞 ${d.telefono}</div>
        <div>📍 ${d.direccion}</div>
        <div>✉️ ${d.email}</div>
        <div>👤 ${d.dirigente}</div>
      </div>
    `;
  });

  tabla.innerHTML = htmlTabla;
  cards.innerHTML = htmlCards;
  info.textContent = `Mostrando ${limitados.length} de ${lista.length} resultados`;
}

/* 🔎 BUSCADOR */
document.getElementById('buscador').addEventListener('keyup', e => {
  clearTimeout(timeout);

  timeout = setTimeout(() => {
    const texto = limpiarTexto(e.target.value);

    const filtrados = datos.filter(p => {
      const d = normalizar(p);

      return (
        limpiarTexto(d.nombre).includes(texto) ||
        limpiarTexto(d.telefono).includes(texto) ||
        limpiarTexto(d.direccion).includes(texto) ||
        limpiarTexto(d.email).includes(texto) ||
        limpiarTexto(d.dirigente).includes(texto)
      );
    });

    mostrarDatos(filtrados);
  }, 300);
});
</script>

</body>
</html>
